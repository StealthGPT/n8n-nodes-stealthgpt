name: Publish to npm

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # required for npm provenance / OIDC trusted publishing

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm
      # npm >= 11.5.1 is required for OIDC trusted publishing
      - run: npm install -g npm@latest
      - run: npm ci
      # `npm run release` (n8n-node release) lints, builds and publishes with
      # provenance in CI. With OIDC trusted publishing configured, no token is
      # needed; otherwise the NPM_TOKEN repository secret is used as a fallback.
      - name: Release (lint, build, publish with provenance)
        run: |
          [ -n "$NPM_TOKEN" ] && npm config set //registry.npmjs.org/:_authToken "$NPM_TOKEN"
          npm run release
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
