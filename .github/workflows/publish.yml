name: Publish to npm

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # required for npm provenance / OIDC trusted publishing

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm
      # npm >= 11.5.1 is required for OIDC trusted publishing
      - run: npm install -g npm@latest
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      # With npm trusted publishing configured for this package, no token is needed.
      # As a fallback, set the NPM_TOKEN repository secret and it will be used automatically.
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
